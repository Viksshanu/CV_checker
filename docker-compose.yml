version: '3.8'

services:
  mongodb:
    image: mongo:5.0
    container_name: placement_mongo
    environment:
      MONGO_INITDB_DATABASE: placement_cv_screening
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - placement_network

  backend:
    build: ./backend
    container_name: placement_backend
    environment:
      MONGODB_URI: mongodb://mongodb:27017/placement_cv_screening
      JWT_SECRET: your-secure-secret-key-change-this
      PORT: 5000
      NODE_ENV: development
      FRONTEND_URL: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend:/app
      - /app/node_modules
    networks:
      - placement_network

  frontend:
    build: ./frontend
    container_name: placement_frontend
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - placement_network

volumes:
  mongo_data:

networks:
  placement_network:
    driver: bridge
